<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Works For Sale | JAB STEP DESIGN</title>

<link rel="stylesheet" href="style.css">

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial, Helvetica, sans-serif;
}

.sale-container{
    max-width:1400px;
    margin:auto;
    padding:40px 60px 70px;
}

.sale-header{
    text-align:center;
    margin-bottom:50px;
}

.sale-header h1{
    margin:0;
    font-size:3rem;
    letter-spacing:10px;
    font-weight:700;
}

.sale-header p{
    margin-top:18px;
    color:#666;
    letter-spacing:5px;
    font-size:.9rem;
}

.sale-piece{
    display:grid;
    grid-template-columns:1fr 300px;
    gap:90px;
    align-items:start;
}

.sale-image{
    display:flex;
    justify-content:center;
    align-items:flex-start;
}

.sale-image img{
    max-height:480px;
    width:auto;
    max-width:100%;
    object-fit:contain;
    display:block;
}

.sale-info{
    border-top:1px solid #222;
    padding-top:10px;
}

.sale-info h2{
    margin:0 0 40px;
    font-size:1.45rem;
    letter-spacing:6px;
    line-height:1.35;
    font-weight:700;
}

.spec{
    margin-bottom:22px;
}

.spec strong{
    display:block;
    margin-bottom:8px;
    font-size:.95rem;
    letter-spacing:3px;
}

.spec span{
    color:#9d9d9d;
    font-size:1rem;
    line-height:1.5;
}

.sale-divider{
    border:none;
    border-top:1px solid #222;
    margin:35px 0;
}

.inquire-btn{
    display:block;
    width:100%;
    padding:22px;
    text-align:center;
    text-decoration:none;
    color:#fff;
    border:1px solid #777;
    letter-spacing:4px;
    transition:.3s;
}

.inquire-btn:hover{
    background:#fff;
    color:#000;
}

.back-btn{
    display:inline-block;
    margin-top:55px;
    color:#fff;
    text-decoration:none;
    letter-spacing:4px;
    font-size:.9rem;
}

.back-btn:hover{
    opacity:.7;
}

@media(max-width:1000px){

    .sale-piece{
        grid-template-columns:1fr;
        gap:40px;
    }

    .sale-info{
        max-width:400px;
    }

    .sale-image img{
        max-height:none;
        width:100%;
    }

    .sale-header h1{
        font-size:2.2rem;
        letter-spacing:7px;
    }
}
</style>
</head>

<body>

<div class="sale-container">

    <div class="sale-header">
        <h1>WORKS FOR SALE</h1>
        <p>ORIGINAL ARTWORK AVAILABLE</p>
    </div>

    <div class="sale-piece">

        <div class="sale-image">
            <img src="sale-1.jpg" alt="Mutual Disinterest">
        </div>

        <div class="sale-info">

            <h2>
                MUTUAL<br>
                DISINTEREST
            </h2>

            <div class="spec">
                <strong>MEDIUM</strong>
                <span>Monotype, Unmounted</span>
            </div>

            <div class="spec">
                <strong>SIZE</strong>
                <span>22" × 30"</span>
            </div>

            <div class="spec">
                <strong>YEAR</strong>
                <span>2026</span>
            </div>

            <div class="spec">
                <strong>PRICE</strong>
                <span>$250 USD</span>
            </div>

            <div class="spec">
                <strong>STATUS</strong>
                <span>Available for Purchase</span>
            </div>

            <hr class="sale-divider">

            <a href="https://instagram.com/jab_stepin.on.art"
               target="_blank"
               class="inquire-btn">
                INQUIRE ON INSTAGRAM
            </a>

        </div>

    </div>

    <a href="index.html" class="back-btn">
        ← BACK TO PORTFOLIO
    </a>

</div>

</body>
</html>
