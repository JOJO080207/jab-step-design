<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Works For Sale | JAB STEP DESIGN</title>

<link rel="stylesheet" href="style.css">

<style>
body{
    background:#000;
    color:#fff;
    font-family:Arial,Helvetica,sans-serif;
    margin:0;
}

.sale-container{
    max-width:1320px;
    margin:auto;
    padding:45px 50px 70px;
}

.sale-header{
    text-align:center;
    margin-bottom:45px;
}

.sale-header h1{
    font-size:3rem;
    letter-spacing:10px;
    margin:0 0 15px;
}

.sale-header p{
    color:#777;
    letter-spacing:5px;
    font-size:.9rem;
}

.sale-piece{
    display:grid;
    grid-template-columns:1.15fr .45fr;
    gap:60px;
    align-items:start;
}

.sale-image{
    display:flex;
    justify-content:center;
    border:none;
}

.sale-image img{
    width:auto;
    max-width:100%;
    max-height:520px;
    object-fit:contain;
    display:block;
}

.sale-info{
    max-width:270px;
    border-top:1px solid #222;
    padding-top:10px;
}

.sale-info h2{
    font-size:1.55rem;
    letter-spacing:5px;
    line-height:1.3;
    margin:0 0 38px;
}

.spec{
    margin-bottom:26px;
}

.spec strong{
    display:block;
    font-size:.9rem;
    letter-spacing:3px;
    margin-bottom:8px;
}

.spec span{
    color:#b8b8b8;
    line-height:1.5;
}

.sale-divider{
    border:none;
    border-top:1px solid #222;
    margin:32px 0;
}

.inquire-btn{
    display:block;
    text-align:center;
    padding:16px 18px;
    border:1px solid white;
    color:white;
    text-decoration:none;
    letter-spacing:4px;
    transition:.3s;
}

.inquire-btn:hover{
    background:white;
    color:black;
}

.back-btn{
    display:inline-block;
    margin-top:45px;
    color:white;
    text-decoration:none;
    letter-spacing:4px;
    font-size:.9rem;
}

.back-btn:hover{
    opacity:.65;
}

@media(max-width:900px){
    .sale-container{
        padding:35px 25px 60px;
    }

    .sale-header h1{
        font-size:2.4rem;
        letter-spacing:7px;
    }

    .sale-piece{
        grid-template-columns:1fr;
        gap:40px;
    }

    .sale-info{
        max-width:100%;
    }

    .sale-image img{
        max-height:none;
        width:100%;
    }
}
</style>
</head>

<body>

<div class="sale-container">

    <div class="sale-header">
        <h1>WORKS FOR SALE</h1>
        <p>ORIGINAL ARTWORK AVAILABLE</p>
    </div>

    <div class="sale-piece">

        <div class="sale-image">
            <img src="sale-1.jpg" alt="Mutual Disinterest">
        </div>

        <div class="sale-info">

            <h2>MUTUAL<br>DISINTEREST</h2>

            <div class="spec">
                <strong>MEDIUM</strong>
                <span>Monotype, Unmounted</span>
            </div>

            <div class="spec">
                <strong>SIZE</strong>
                <span>22" × 30"</span>
            </div>

            <div class="spec">
                <strong>YEAR</strong>
                <span>2026</span>
            </div>

            <div class="spec">
                <strong>PRICE</strong>
                <span>$250 USD</span>
            </div>

            <div class="spec">
                <strong>STATUS</strong>
                <span>Available for Purchase</span>
            </div>

            <hr class="sale-divider">

            <a href="https://instagram.com/jab_stepin.on.art"
               target="_blank"
               class="inquire-btn">
                INQUIRE ON INSTAGRAM
            </a>

        </div>

    </div>

    <a href="index.html" class="back-btn">
        ← BACK TO PORTFOLIO
    </a>

</div>

</body>
</html>
